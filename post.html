<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Simon</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-name">Simon</span>
        <span class="logo-dot">.</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="blog.html" class="nav-link active">Blog</a></li>
          <li><a href="projects.html" class="nav-link">Projects</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
        </ul>
      </nav>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
      </button>
    </div>
  </header>

  <main>
    <!-- ===== ARTICLE HEADER (populated by JS) ===== -->
    <section class="page-header post-header">
      <div class="page-header-inner">
        <a href="blog.html" class="back-link">&larr; All Posts</a>
        <h1 class="page-title" id="post-title">Loading…</h1>
        <div class="post-meta" id="post-meta">
          <span class="post-date" id="post-date"></span>
          <span class="meta-sep">&middot;</span>
          <span class="post-reading-time" id="post-reading-time"></span>
        </div>
        <div class="post-tags" id="post-tags"></div>
      </div>
    </section>

    <!-- ===== ARTICLE BODY (markdown rendered here) ===== -->
    <article class="page-content prose" id="post-content">
      <p class="loading-text">Loading post…</p>
    </article>

    <!-- ===== POST NAVIGATION ===== -->
    <nav class="post-nav" id="post-nav">
      <div class="post-nav-inner">
        <a href="#" class="post-nav-link prev" id="post-prev">
          <span class="post-nav-label">&larr; Previous</span>
          <span class="post-nav-title" id="post-prev-title"></span>
        </a>
        <a href="#" class="post-nav-link next" id="post-next">
          <span class="post-nav-label">Next &rarr;</span>
          <span class="post-nav-title" id="post-next-title"></span>
        </a>
      </div>
    </nav>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">Simon<span class="logo-dot">.</span></span>
        <p class="footer-tagline">Process engineering, one experiment at a time.</p>
      </div>
      <div class="footer-right">
        <a href="mailto:hello@example.com" class="footer-link">Email</a>
        <a href="https://linkedin.com" class="footer-link" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com" class="footer-link" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/markdown-parser.js"></script>
</body>
</html>
